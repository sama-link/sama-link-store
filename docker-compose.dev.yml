version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sama_link_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/sama_link_db?sslmode=disable"
      PGSSLMODE: "disable"
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
