services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sama_link_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/sama_link_db?sslmode=disable"
      PGSSLMODE: "disable"
      # Production serves the prebuilt admin (all custom routes + widgets
      # already baked into /app/.medusa/server/public/admin/assets/*).
      # Development triggers Vite dev middleware which fails here because
      # the WORKDIR (/app) and the admin base URL (/app) collide: Medusa's
      # admin-sdk emits virtual imports like "/app/src/admin/routes/...".
      # Vite interprets the /app/ prefix as its base URL, strips it, and
      # then cannot resolve /src/admin/... against the project root.
      NODE_ENV: "production"
      # Exposes the monorepo `translations/` folder to the Sama content
      # library admin route (ADR-046 · sama-content → ADR-047). Read+write
      # since ADR-047 opened the sama-content surface to inline CSV edits.
      # The container writes both the CSV and `.edit-log.jsonl` here; the
      # host's next `git commit` picks up both files together.
      SAMA_TRANSLATIONS_DIR: "/app/translations"
      # ADR-047 · Live two-way sync — every sama-content edit mirrors into
      # the storefront's next-intl runtime JSON so the `/en` and `/ar`
      # pages pick the change up on the next render without any manual
      # "regenerate messages" step. Storefront dev server (Next.js) sees
      # the bind-mounted file change and hot-reloads.
      SAMA_STOREFRONT_MESSAGES_DIR: "/app/storefront-messages"
    ports:
      - "9000:9000"
    volumes:
      # Live-mounted so CSV edits on the host reflect immediately in the
      # admin content library without a container rebuild, AND so the admin
      # can write back through PATCH /admin/sama-content/translations
      # (ADR-047). Intentionally NOT read-only — write access is required.
      - ./translations:/app/translations
      # Bind the storefront's messages folder so the backend PATCH can
      # write runtime JSON in lockstep with the CSV (ADR-047 BACK-12).
      # The host's `apps/storefront/messages/{en,ar}.json` files ARE the
      # live files — no copying involved. Next.js in dev mode picks up
      # the change via its file watcher.
      - ./apps/storefront/messages:/app/storefront-messages
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
